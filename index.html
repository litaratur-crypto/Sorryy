<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özür</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#FFC107;
  font-family:'Nunito',sans-serif;
  height:100vh;overflow:hidden;
  display:flex;justify-content:center;align-items:center;
}

.slide{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  padding:40px 32px;
  text-align:center;
  background:#FFC107;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.6s ease, transform 0.6s ease;
  transform: translateY(40px);
}
.slide.active{
  opacity:1;
  pointer-events:all;
  transform:translateY(0);
}
.slide.exit{
  opacity:0;
  transform:translateY(-50px);
  pointer-events:none;
}

/* SLIDE 0 - intro */
.slide-label{
  font-size:12px;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;color:rgba(0,0,0,0.35);
  margin-bottom:28px;
}
.slide-title{
  font-size:clamp(26px,7vw,50px);
  font-weight:900;color:#111;
  line-height:1.25;
}
.slide-arrow{
  margin-top:52px;
  font-size:32px;color:#111;
  cursor:pointer;
  animation:bounce 1.4s ease infinite;
}
@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(10px);}
}

/* SLIDES 1-3 - photo + text */
.photo-wrap{
  width:min(300px,78vw);
  height:min(300px,78vw);
  border-radius:24px;overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,0.2);
  flex-shrink:0;
}
.photo-wrap img{
  width:100%;height:100%;object-fit:cover;
  display:block;
}
.slide-text{
  font-size:clamp(22px,6vw,34px);
  font-weight:800;color:#111;
  margin-top:30px;
  line-height:1.3;
}

/* dots */
.dots{
  position:fixed;bottom:32px;left:50%;
  transform:translateX(-50%);
  display:flex;gap:8px;
}
.dot{
  width:9px;height:9px;border-radius:50%;
  background:rgba(0,0,0,0.2);
  transition:background 0.4s, transform 0.4s;
}
.dot.active{background:#111;transform:scale(1.3);}
</style>
</head>

<!-- dots (shown from slide 1 onward) -->
<div class="dots" id="dots" style="display:none;">
  <div class="dot active" id="d0"></div>
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
</div>
  <div style="text-align: center; margin-top: 20px;">
  <audio id="benim-muzigim" controls loop>
    <source src="sarki.mp3" type="audio/mpeg">
    Tarayıcınız bu ses özelliğini desteklemiyor.
  </audio>
</div>

<script>
const slides = [
  document.getElementById('s0'),
  document.getElementById('s1'),
  document.getElementById('s2'),
  document.getElementById('s3'),
];
const dots = [
  document.getElementById('d0'),
  document.getElementById('d1'),
  document.getElementById('d2'),
];
const dotsWrap = document.getElementById('dots');

let cur = 0;
let transitioning = false;

function goTo(next) {
  if (transitioning) return;
  if (next >= slides.length) return;
  transitioning = true;

  const current = slides[cur];
  const nextSlide = slides[next];

  // exit current
  current.classList.remove('active');
  current.classList.add('exit');

  // enter next
  nextSlide.style.transform = 'translateY(40px)';
  nextSlide.style.opacity = '0';
  nextSlide.classList.add('active');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    nextSlide.style.transform = 'translateY(0)';
    nextSlide.style.opacity = '1';
  }));

  setTimeout(() => {
    current.classList.remove('exit');
    transitioning = false;
  }, 700);

  cur = next;

  // dots
  if (next >= 1) {
    dotsWrap.style.display = 'flex';
    dots.forEach((d,i) => d.classList.toggle('active', i === next-1));
  } else {
    dotsWrap.style.display = 'none';
  }
}

// Start music on first interaction
let musicStarted = false;
const bgAudio = document.getElementById('bgmusic');

function tryMusic() {
  if (!musicStarted) {
    musicStarted = true;
    bgAudio.volume = 0.85;
    bgAudio.play().catch(() => {
      musicStarted = false;
    });
  }
}

// Click/tap anywhere to advance
document.addEventListener('click', () => {
  tryMusic();
  if (cur < slides.length - 1) goTo(cur + 1);
});

document.addEventListener('touchstart', tryMusic, {once:true});

// Auto-advance slides 1-3
setTimeout(() => {
  setInterval(() => {
    if (cur >= 1 && cur < slides.length - 1) goTo(cur + 1);
    else if (cur === slides.length - 1) goTo(1);
  }, 6000);
}, 8000);
</script>
