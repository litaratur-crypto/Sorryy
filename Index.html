<title>Özür</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap');

  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:#0a0a0a;
    display:flex;justify-content:center;align-items:center;
    height:100vh;overflow:hidden;
    font-family:'Caveat',cursive;
  }
  .container{text-align:center;position:relative;}

  .photo-wrap{
    width:320px;height:320px;margin:0 auto;
    border-radius:20px;overflow:hidden;
    box-shadow:0 0 40px rgba(255,100,100,0.3);
    position:relative;
  }
  .photo-wrap img{
    width:100%;height:100%;object-fit:cover;
    position:absolute;top:0;left:0;
    transition:opacity 0.6s ease;
  }
  .photo-wrap img.hidden{opacity:0;}
  .photo-wrap img.visible{opacity:1;}

  .text{
    font-size:38px;
    color:#fff;
    margin-top:24px;
    min-height:60px;
    transition:transform .6s ease, opacity .6s ease;
    text-shadow: 0 0 20px rgba(255,150,150,0.5);
  }
  .text.slide-out{transform:translateX(-120px);opacity:0;}
  .text.slide-in{transform:translateX(120px);opacity:0;}

  .hearts{
    position:fixed;top:0;left:0;width:100%;height:100%;
    pointer-events:none;overflow:hidden;z-index:-1;
  }
  .heart{
    position:absolute;bottom:-50px;
    font-size:24px;
    animation:rise 4s ease-in infinite;
    opacity:0;
  }
  @keyframes rise{
    0%{transform:translateY(0) scale(0.8);opacity:.7;}
    100%{transform:translateY(-110vh) scale(1.2);opacity:0;}
  }
</style>

  <div id="text" class="text">Tepkisizliğinin farkındayım</div>
</div>

<iframe width="0" height="0"
  src="https://www.youtube.com/embed/Qn8F_u0vBNI?autoplay=1&mute=0&loop=1&playlist=Qn8F_u0vBNI&start=99"
  allow="autoplay">
</iframe>

<script>
const texts = [
  "Tepkisizliğinin farkındayım",
  "Kırdıysam özür dilerim",
  "Hiç mi konuşmayacaksın ?"
];

let cur = 0;
const imgs = [document.getElementById('img0'),document.getElementById('img1'),document.getElementById('img2')];
const textEl = document.getElementById('text');

// floating hearts
const heartsDiv = document.getElementById('hearts');
const emojis = ['🐾','❤️','🐶','💔','🥺'];
for(let h=0;h<18;h++){
  const s = document.createElement('span');
  s.className='heart';
  s.textContent = emojis[h%emojis.length];
  s.style.left = (Math.random()*100)+'%';
  s.style.animationDelay = (Math.random()*4)+'s';
  s.style.fontSize = (16+Math.random()*20)+'px';
  heartsDiv.appendChild(s);
}

setInterval(()=>{
  textEl.classList.add('slide-out');

  setTimeout(()=>{
    imgs[cur].classList.remove('visible');
    imgs[cur].classList.add('hidden');
    cur = (cur+1)%3;
    imgs[cur].classList.remove('hidden');
    imgs[cur].classList.add('visible');
    textEl.textContent = texts[cur];
    textEl.classList.remove('slide-out');
    textEl.classList.add('slide-in');
    setTimeout(()=>textEl.classList.remove('slide-in'),50);
  },600);

},7000);
</script>
